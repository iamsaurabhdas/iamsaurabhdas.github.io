<!DOCTYPE html>
<html>

<head>

<title>Bug Report Example | Saurabh Das</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#f5f7fb;
}

.container{
max-width:800px;
margin:auto;
padding:40px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h1{
margin-top:0;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>Bug Report Example</h1>

<table>

<tr>
<td><b>Title</b></td>
<td>Login button not responding on mobile</td>
</tr>

<tr>
<td><b>Environment</b></td>
<td>Chrome Mobile / Android</td>
</tr>

<tr>
<td><b>Severity</b></td>
<td>High</td>
</tr>

<tr>
<td><b>Steps to Reproduce</b></td>
<td>
1. Open login page<br>
2. Enter credentials<br>
3. Tap Login button
</td>
</tr>

<tr>
<td><b>Expected Result</b></td>
<td>User should be logged in</td>
</tr>

<tr>
<td><b>Actual Result</b></td>
<td>Button click does nothing</td>
</tr>

</table>

</div>

</div>

</body>

</html>
